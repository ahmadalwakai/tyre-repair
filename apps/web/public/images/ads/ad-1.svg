<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="Premium tyres fitted on site">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1305"/>
      <stop offset="55%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#5a4214"/>
      <stop offset="55%" stop-color="#2a1f08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="hub" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#5a4214"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="900" fill="url(#bg)"/>

  <!-- Floor reflection -->
  <ellipse cx="300" cy="730" rx="220" ry="22" fill="rgba(255,215,0,0.18)"/>
  <ellipse cx="300" cy="735" rx="160" ry="10" fill="rgba(0,0,0,0.65)"/>

  <!-- Tyre -->
  <g transform="translate(300 460)">
    <!-- Outer rubber -->
    <circle r="240" fill="url(#rubber)"/>
    <circle r="240" fill="none" stroke="#000" stroke-width="3"/>

    <!-- Sidewall ring -->
    <circle r="222" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
    <circle r="200" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>

    <!-- Sidewall lettering -->
    <g font-family="Inter, Arial, sans-serif" fill="#7a7a7a" font-weight="700">
      <text x="0" y="-208" text-anchor="middle" font-size="13" letter-spacing="2.5">225/45 R17  94Y</text>
    </g>

    <!-- Tread blocks (24 around) -->
    <g fill="#161616" stroke="#000" stroke-width="1.5">
      <g>
        <g transform="rotate(0)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(15)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(30)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(45)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(60)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(75)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(90)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(105)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(120)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(135)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(150)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(165)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(180)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(195)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(210)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(225)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(240)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(255)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(270)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(285)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(300)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(315)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(330)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
        <g transform="rotate(345)"><rect x="-18" y="-242" width="36" height="40" rx="4"/></g>
      </g>
    </g>

    <!-- Inner edge -->
    <circle r="180" fill="#0a0a0a" stroke="#000" stroke-width="3"/>

    <!-- Alloy rim -->
    <circle r="160" fill="url(#rim)"/>
    <circle r="160" fill="none" stroke="url(#gold)" stroke-width="2.5"/>

    <!-- 5-spoke alloy -->
    <g fill="url(#gold)" stroke="#3a2a08" stroke-width="1.5">
      <g>
        <path d="M 0 -150 L 12 -45 L -12 -45 Z" transform="rotate(0)"/>
        <path d="M 0 -150 L 12 -45 L -12 -45 Z" transform="rotate(72)"/>
        <path d="M 0 -150 L 12 -45 L -12 -45 Z" transform="rotate(144)"/>
        <path d="M 0 -150 L 12 -45 L -12 -45 Z" transform="rotate(216)"/>
        <path d="M 0 -150 L 12 -45 L -12 -45 Z" transform="rotate(288)"/>
      </g>
    </g>
    <circle r="48" fill="url(#hub)" stroke="#3a2a08" stroke-width="2"/>
    <circle r="14" fill="#0a0a0a"/>

    <!-- Lug nuts -->
    <g fill="#0a0a0a" stroke="url(#gold)" stroke-width="1">
      <circle r="6" cx="0" cy="-35"/>
      <circle r="6" cx="33" cy="-11"/>
      <circle r="6" cx="20" cy="28"/>
      <circle r="6" cx="-20" cy="28"/>
      <circle r="6" cx="-33" cy="-11"/>
    </g>

    <!-- Highlight gloss -->
    <ellipse cx="-90" cy="-130" rx="80" ry="30" fill="rgba(255,255,255,0.06)" transform="rotate(-30 -90 -130)"/>
  </g>

  <!-- Top brand badge -->
  <g transform="translate(300 90)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="3">PREMIUM TYRES</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif" filter="url(#glow)">
    <text x="300" y="800" font-size="56" font-weight="800" fill="url(#gold)">Fitted On Site.</text>
    <text x="300" y="855" font-size="22" font-weight="500" fill="#cfc7a8" font-family="Inter, Arial, sans-serif" letter-spacing="2">BUDGET · MID-RANGE · PREMIUM</text>
  </g>
</svg>
