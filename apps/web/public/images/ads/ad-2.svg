<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="All-season tyres in stock">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1305"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber2" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="80%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg2)"/>

  <!-- Three stacked tyres seen edge-on (cylinders) -->
  <g>
    <!-- Tyre 3 (back/top) -->
    <g transform="translate(300 380)">
      <ellipse cx="0" cy="0" rx="220" ry="46" fill="url(#rubber2)" stroke="#000" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="220" ry="46" fill="none" stroke="url(#gold2)" stroke-width="1.2" opacity="0.5"/>
      <!-- tread along top surface -->
      <g fill="#1c1c1c" stroke="#000" stroke-width="1">
        <rect x="-200" y="-50" width="22" height="14" rx="2"/>
        <rect x="-160" y="-52" width="22" height="14" rx="2"/>
        <rect x="-118" y="-54" width="24" height="14" rx="2"/>
        <rect x="-72" y="-56" width="24" height="14" rx="2"/>
        <rect x="-24" y="-57" width="24" height="14" rx="2"/>
        <rect x="24" y="-56" width="24" height="14" rx="2"/>
        <rect x="72" y="-54" width="24" height="14" rx="2"/>
        <rect x="118" y="-52" width="22" height="14" rx="2"/>
        <rect x="156" y="-50" width="22" height="14" rx="2"/>
      </g>
      <!-- inner hole -->
      <ellipse cx="0" cy="6" rx="80" ry="14" fill="#000" opacity="0.7"/>
    </g>
    <!-- Tyre 2 (middle) -->
    <g transform="translate(300 470)">
      <ellipse cx="0" cy="0" rx="230" ry="50" fill="url(#rubber2)" stroke="#000" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="230" ry="50" fill="none" stroke="url(#gold2)" stroke-width="1.5" opacity="0.55"/>
      <g fill="#1c1c1c" stroke="#000" stroke-width="1">
        <rect x="-210" y="-54" width="22" height="14" rx="2"/>
        <rect x="-170" y="-56" width="22" height="14" rx="2"/>
        <rect x="-126" y="-58" width="24" height="14" rx="2"/>
        <rect x="-78" y="-60" width="24" height="14" rx="2"/>
        <rect x="-26" y="-61" width="26" height="14" rx="2"/>
        <rect x="26" y="-60" width="26" height="14" rx="2"/>
        <rect x="78" y="-58" width="24" height="14" rx="2"/>
        <rect x="126" y="-56" width="22" height="14" rx="2"/>
        <rect x="166" y="-54" width="22" height="14" rx="2"/>
      </g>
      <ellipse cx="0" cy="8" rx="86" ry="16" fill="#000" opacity="0.7"/>
      <text x="0" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#7a7a7a">205/55 R16</text>
    </g>
    <!-- Tyre 1 (front/bottom) -->
    <g transform="translate(300 570)">
      <ellipse cx="0" cy="0" rx="240" ry="54" fill="url(#rubber2)" stroke="#000" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="240" ry="54" fill="none" stroke="url(#gold2)" stroke-width="2" opacity="0.6"/>
      <g fill="#1c1c1c" stroke="#000" stroke-width="1">
        <rect x="-220" y="-58" width="24" height="16" rx="2"/>
        <rect x="-178" y="-60" width="24" height="16" rx="2"/>
        <rect x="-130" y="-62" width="26" height="16" rx="2"/>
        <rect x="-80" y="-64" width="26" height="16" rx="2"/>
        <rect x="-26" y="-65" width="28" height="16" rx="2"/>
        <rect x="26" y="-64" width="28" height="16" rx="2"/>
        <rect x="80" y="-62" width="26" height="16" rx="2"/>
        <rect x="130" y="-60" width="24" height="16" rx="2"/>
        <rect x="172" y="-58" width="24" height="16" rx="2"/>
      </g>
      <ellipse cx="0" cy="10" rx="92" ry="18" fill="#000" opacity="0.75"/>
    </g>
  </g>

  <!-- Floor glow -->
  <ellipse cx="300" cy="640" rx="240" ry="14" fill="rgba(255,215,0,0.18)"/>

  <!-- Top badge -->
  <g transform="translate(300 110)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold2)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="2.5">VAN TYRE OPTIONS</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif">
    <text x="300" y="760" font-size="48" font-weight="800" fill="url(#gold2)">Common Sizes</text>
    <text x="300" y="810" font-size="44" font-weight="700" fill="#fff">Available</text>
    <text x="300" y="855" font-size="20" font-weight="500" fill="#cfc7a8" font-family="Inter, Arial, sans-serif">Summer · Winter · All-Season · Run-Flat</text>
  </g>
</svg>
