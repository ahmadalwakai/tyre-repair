<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="Run-flat tyre">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1305"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber3" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="80%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="rim3" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6a4f18"/>
      <stop offset="60%" stop-color="#2a1f08"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg3)"/>

  <!-- Tyre tilted in 3/4 perspective -->
  <g transform="translate(300 470) rotate(-8)">
    <ellipse rx="240" ry="225" fill="url(#rubber3)" stroke="#000" stroke-width="3"/>
    <ellipse rx="222" ry="208" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>

    <!-- diagonal directional tread pattern -->
    <g stroke="#000" stroke-width="1.2" fill="#161616">
      <g>
        <g transform="rotate(0)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(20)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(40)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(60)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(80)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(100)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(120)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(140)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(160)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(180)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(200)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(220)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(240)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(260)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(280)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(300)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(320)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
        <g transform="rotate(340)"><polygon points="-20,-242 20,-242 28,-200 -28,-200"/></g>
      </g>
    </g>

    <!-- centre groove ring -->
    <circle r="195" fill="none" stroke="#0a0a0a" stroke-width="3"/>

    <!-- sidewall lettering -->
    <text y="-208" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#bfa658" letter-spacing="3">RUN-FLAT  ·  RFT</text>

    <!-- Rim -->
    <circle r="170" fill="#0a0a0a" stroke="#000" stroke-width="2"/>
    <circle r="160" fill="url(#rim3)" stroke="url(#gold3)" stroke-width="2"/>

    <!-- multi-spoke alloy -->
    <g stroke="url(#gold3)" stroke-width="9" stroke-linecap="round">
      <line x1="0" y1="-150" x2="0" y2="150"/>
      <line x1="-150" y1="0" x2="150" y2="0"/>
      <line x1="-106" y1="-106" x2="106" y2="106"/>
      <line x1="-106" y1="106" x2="106" y2="-106"/>
      <line x1="-58" y1="-138" x2="58" y2="138"/>
      <line x1="-138" y1="-58" x2="138" y2="58"/>
      <line x1="58" y1="-138" x2="-58" y2="138"/>
      <line x1="138" y1="-58" x2="-138" y2="58"/>
    </g>
    <circle r="42" fill="#0a0a0a" stroke="url(#gold3)" stroke-width="3"/>
    <circle r="12" fill="url(#gold3)"/>
  </g>

  <!-- Top badge -->
  <g transform="translate(300 100)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold3)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="2.5">RUN-FLAT TYRE FITTING</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif">
    <text x="300" y="800" font-size="42" font-weight="800" fill="url(#gold3)">Run-flat options available</text>
    <text x="300" y="855" font-size="22" font-weight="500" fill="#cfc7a8" font-family="Inter, Arial, sans-serif">Run-flat tyres fitted at your kerbside</text>
  </g>
</svg>
