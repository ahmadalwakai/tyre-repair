<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="Winter tyres for grip">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1418"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber4" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="80%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg4)"/>

  <!-- Snow flecks -->
  <g fill="rgba(255,255,255,0.55)">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="520" cy="160" r="2.4"/>
    <circle cx="120" cy="220" r="1.8"/>
    <circle cx="480" cy="60" r="1.5"/>
    <circle cx="60" cy="320" r="1.8"/>
    <circle cx="540" cy="280" r="2"/>
    <circle cx="40" cy="500" r="1.5"/>
    <circle cx="560" cy="450" r="2.2"/>
    <circle cx="100" cy="700" r="2"/>
    <circle cx="500" cy="720" r="1.5"/>
  </g>

  <!-- Tyre showing tread face (top-down) -->
  <g transform="translate(300 470)">
    <circle r="240" fill="url(#rubber4)" stroke="#000" stroke-width="3"/>

    <!-- Aggressive winter tread blocks with sipes -->
    <g fill="#181818" stroke="#000" stroke-width="1.5">
      <!-- outer ring -->
      <g>
        <g transform="rotate(0)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(18)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(36)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(54)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(72)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(90)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(108)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(126)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(144)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(162)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(180)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(198)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(216)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(234)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(252)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(270)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(288)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(306)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(324)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
        <g transform="rotate(342)"><rect x="-22" y="-238" width="44" height="46" rx="4"/></g>
      </g>
      <!-- middle ring offset -->
      <g>
        <g transform="rotate(9)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(27)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(45)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(63)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(81)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(99)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(117)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(135)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(153)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(171)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(189)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(207)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(225)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(243)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(261)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(279)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(297)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(315)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(333)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
        <g transform="rotate(351)"><rect x="-20" y="-188" width="40" height="40" rx="3"/></g>
      </g>
    </g>

    <!-- centre groove -->
    <circle r="120" fill="#0a0a0a" stroke="#000" stroke-width="2"/>

    <!-- 3-peak mountain snowflake symbol -->
    <g transform="translate(0 0)" fill="url(#gold4)" stroke="#0a0a0a" stroke-width="1.5">
      <path d="M -50 30 L -20 -10 L 0 20 L 20 -10 L 50 30 Z"/>
      <g stroke="url(#gold4)" stroke-width="3" fill="none" stroke-linecap="round">
        <line x1="0" y1="-50" x2="0" y2="-15"/>
        <line x1="-30" y1="-30" x2="30" y2="-30"/>
        <line x1="-22" y1="-45" x2="22" y2="-15"/>
        <line x1="22" y1="-45" x2="-22" y2="-15"/>
      </g>
    </g>
  </g>

  <!-- Top badge -->
  <g transform="translate(300 100)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold4)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="2.5">WINTER TYRES</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif">
    <text x="300" y="800" font-size="54" font-weight="800" fill="url(#gold4)">Grip when</text>
    <text x="300" y="855" font-size="54" font-weight="800" fill="url(#gold4)">it matters.</text>
  </g>
</svg>
