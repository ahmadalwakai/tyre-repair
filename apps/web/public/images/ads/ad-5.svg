<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="Tyre repair patch advert">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1305"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="gold5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber5" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg5)"/>

  <!-- Side view of a tyre cross-section showing puncture -->
  <g transform="translate(300 460)">
    <!-- Tyre arc (side profile) -->
    <path d="M -240 0
             a 240 240 0 0 1 480 0
             l -60 0
             a 180 180 0 0 0 -360 0 Z"
          fill="url(#rubber5)" stroke="#000" stroke-width="3"/>

    <!-- tread on top -->
    <g fill="#1c1c1c" stroke="#000" stroke-width="1.5">
      <rect x="-220" y="-238" width="28" height="34" rx="3" transform="rotate(-55 -220 -238)"/>
      <rect x="-170" y="-258" width="28" height="34" rx="3" transform="rotate(-40 -170 -258)"/>
      <rect x="-115" y="-272" width="28" height="34" rx="3" transform="rotate(-25 -115 -272)"/>
      <rect x="-58" y="-280" width="30" height="34" rx="3" transform="rotate(-10 -58 -280)"/>
      <rect x="-2" y="-282" width="30" height="34" rx="3" transform="rotate(5 -2 -282)"/>
      <rect x="55" y="-280" width="28" height="34" rx="3" transform="rotate(20 55 -280)"/>
      <rect x="110" y="-272" width="28" height="34" rx="3" transform="rotate(35 110 -272)"/>
      <rect x="160" y="-258" width="28" height="34" rx="3" transform="rotate(50 160 -258)"/>
      <rect x="205" y="-238" width="28" height="34" rx="3" transform="rotate(65 205 -238)"/>
    </g>

    <!-- Puncture point (red) -->
    <g transform="translate(-30 -240)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#ff3a3a" stroke-width="3"/>
      <circle r="6" fill="#ff3a3a"/>
    </g>

    <!-- Patch on the inside -->
    <g transform="translate(-30 -200)">
      <rect x="-55" y="-22" width="110" height="44" rx="8" fill="url(#gold5)" stroke="#5a4214" stroke-width="2"/>
      <text y="6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">REPAIRED</text>
    </g>

    <!-- Arrow -->
    <g stroke="url(#gold5)" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M 100 -180 Q 60 -210 30 -200"/>
      <polyline points="40,-208 30,-200 38,-192"/>
    </g>
    <text x="105" y="-175" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFD700">on-site repair</text>
  </g>

  <!-- Top badge -->
  <g transform="translate(300 100)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-170" y="-26" width="340" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold5)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="2.5">PUNCTURE REPAIR</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif">
    <text x="300" y="710" font-size="56" font-weight="800" fill="url(#gold5)">Repair First.</text>
    <text x="300" y="775" font-size="44" font-weight="700" fill="#fff">Replace if needed.</text>
    <text x="300" y="830" font-size="20" font-weight="500" fill="#cfc7a8" font-family="Inter, Arial, sans-serif">Honest assessment  ·  No upsell</text>
  </g>
</svg>
