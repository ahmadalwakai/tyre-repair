<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="Mobile tyre fitting service">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1408"/>
    </linearGradient>
    <linearGradient id="gold6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>
    <radialGradient id="rubber6" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg6)"/>

  <!-- Halo -->
  <ellipse cx="300" cy="470" rx="280" ry="180" fill="rgba(255,215,0,0.15)"/>

  <!-- Tyre with price tag hanging from sidewall -->
  <g transform="translate(300 470)">
    <circle r="220" fill="url(#rubber6)" stroke="#000" stroke-width="3"/>

    <!-- tread band -->
    <g fill="#161616" stroke="#000" stroke-width="1.5">
      <g>
        <g transform="rotate(0)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(20)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(40)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(60)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(80)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(100)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(120)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(140)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(160)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(180)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(200)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(220)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(240)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(260)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(280)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(300)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(320)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
        <g transform="rotate(340)"><rect x="-18" y="-222" width="36" height="36" rx="3"/></g>
      </g>
    </g>

    <!-- Inner sidewall -->
    <circle r="170" fill="#0a0a0a" stroke="#000" stroke-width="2"/>
    <text y="-150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#7a7a7a" letter-spacing="2.5">TYREREPAIR · UK</text>

    <!-- Rim suggestion -->
    <circle r="130" fill="#1a1305" stroke="url(#gold6)" stroke-width="2"/>
    <g stroke="url(#gold6)" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-110" x2="0" y2="110"/>
      <line x1="-110" y1="0" x2="110" y2="0"/>
      <line x1="-78" y1="-78" x2="78" y2="78"/>
      <line x1="-78" y1="78" x2="78" y2="-78"/>
    </g>
    <circle r="28" fill="#0a0a0a" stroke="url(#gold6)" stroke-width="2"/>

    <!-- Price tag string + tag -->
    <g transform="translate(180 -150)">
      <line x1="-50" y1="40" x2="0" y2="0" stroke="#7a6824" stroke-width="2"/>
      <g transform="rotate(20)">
        <path d="M 0 0 L 160 0 L 180 24 L 160 48 L 0 48 Z" fill="url(#gold6)" stroke="#5a4214" stroke-width="2"/>
        <circle cx="14" cy="24" r="5" fill="#0a0a0a"/>
        <text x="95" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">CLEAR PRICING</text>
      </g>
    </g>
  </g>

  <!-- Floor reflection -->
  <ellipse cx="300" cy="710" rx="220" ry="14" fill="rgba(255,215,0,0.18)"/>

  <!-- Top badge -->
  <g transform="translate(300 100)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <rect x="-180" y="-26" width="360" height="52" rx="26" fill="rgba(255,215,0,0.08)" stroke="url(#gold6)" stroke-width="1.5"/>
    <text y="8" font-size="20" font-weight="800" fill="#FFD700" letter-spacing="2.5">HONEST EMERGENCY PRICING</text>
  </g>

  <!-- Headline -->
  <g text-anchor="middle" font-family="'Playfair Display','Georgia',serif">
    <text x="300" y="780" font-size="42" font-weight="800" fill="url(#gold6)">Clear Quote Before Payment</text>
    <text x="300" y="835" font-size="22" font-weight="500" fill="#cfc7a8" font-family="Inter, Arial, sans-serif">Pay securely online</text>
  </g>
</svg>
